name: Lark API Relay

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: 'Unique request ID'
        required: true
        type: string
      operation:
        description: 'Lark operation (get_records, create_record, etc.)'
        required: true
        type: string
      params:
        description: 'JSON params for the operation'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Execute Lark operation
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_ID: ${{ secrets.LARK_BASE_ID }}
          OPERATION: ${{ inputs.operation }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          PARAMS: ${{ inputs.params }}
          OUTPUT_FILE: lark-relay/${{ inputs.request_id }}.json
        run: python3 lark_relay_runner.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lark-relay/
          git diff --cached --quiet || (git commit -m "relay: ${{ inputs.request_id }}" && git push)
