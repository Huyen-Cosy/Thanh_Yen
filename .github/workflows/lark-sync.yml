name: Lark Data Sync

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync all Lark data
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_ID: ${{ secrets.LARK_BASE_ID }}
          OPERATION: sync_all
          PARAMS: '{}'
          OUTPUT_FILE: lark-data/sync-summary.json
        run: python3 lark_relay_runner.py

      - name: Commit synced data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lark-data/
          git diff --cached --quiet || (git commit -m "sync: Lark data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
